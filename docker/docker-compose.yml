version: '3.8'

services:
  # =======================
  # API Service (FastAPI)
  # =======================
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: ai-genomics-api
    ports:
      - "8000:8000"
    volumes:
      - ../bio-pipeline:/pipeline
      - ../datasets:/datasets
      - datasets-logs:/datasets/logs
    environment:
      - DATABASE_URL=postgresql://genomics:genomics@postgres:5432/genomics
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=genomics
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=genomics
      - MINIO_SECRET_KEY=genomics
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - REFERENCE_GENOME_GZ=/datasets/reference_genome/Homo_sapiens.GRCh38.dna_sm.toplevel.fa.gz
      - REFERENCE_GENOME=/datasets/reference_genome/Homo_sapiens.GRCh38.dna_sm.toplevel.fa
    depends_on:
      - postgres
      - neo4j
      - minio
    networks:
      - genomics-network

  # =======================
  # Graph Database (Neo4j)
  # =======================
  neo4j:
    image: neo4j:5.14-community
    container_name: ai-genomics-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/genomics
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ../graph:/graph
    networks:
      - genomics-network

  # =======================
  # Relational Database (PostgreSQL)
  # =======================
  postgres:
    image: postgres:15
    container_name: ai-genomics-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=genomics
      - POSTGRES_PASSWORD=genomics
      - POSTGRES_DB=genomics
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - genomics-network

  # =======================
  # Object Storage (MinIO)
  # =======================
  minio:
    image: minio/minio
    container_name: ai-genomics-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=genomics
      - MINIO_ROOT_PASSWORD=genomics
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - genomics-network

  # =======================
  # Bioinformatics Pipeline
  # =======================
  bio-pipeline:
    build:
      context: ../bio-pipeline
      dockerfile: Dockerfile
    container_name: ai-genomics-bio
    command: tail -f /dev/null
    mem_limit: 24g
    mem_reservation: 16g
    volumes:
      - ../bio-pipeline:/pipeline
      - ../datasets:/datasets
      - datasets-logs:/datasets/logs
      - datasets-bam:/datasets/bam
      - datasets-vcf:/datasets/vcf
      - datasets-annotations:/datasets/annotations
      - reference-data:/reference
    environment:
      - REFERENCE_GENOME_GZ=/datasets/reference_genome/hg38.fa.gz
      - REFERENCE_GENOME=/datasets/reference_genome/hg38.fa
      - INPUT_DIR=/datasets/fastq
      - OUTPUT_DIR=/datasets/bam
      - VCF_OUTPUT_DIR=/datasets/vcf
      - ANNOTATION_DIR=/datasets/annotations
      - LOGS_DIR=/datasets/logs
    networks:
      - genomics-network

  # =======================
  # Frontend (Next.js)
  # =======================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai-genomics-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - genomics-network

# =======================
# Networks
# =======================
networks:
  genomics-network:
    driver: bridge

# =======================
# Volumes
# =======================
volumes:
  neo4j-data:
  neo4j-logs:
  postgres-data:
  minio-data:
  reference-data:
  datasets-logs:
  datasets-bam:
  datasets-vcf:
  datasets-annotations:

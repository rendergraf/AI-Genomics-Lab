version: '3.8'

services:
  # =======================
  # API Service (FastAPI)
  # =======================
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: ai-genomics-api
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app/api
      - ../services:/app/services
      - ../bio-pipeline:/bio-pipeline
      - ../datasets:/datasets
      - datasets-logs:/datasets/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql://genomics:genomics@postgres:5432/genomics
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=genomics
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=genomics
      - MINIO_SECRET_KEY=genomics
      # MinIO Buckets Configuration
      - MINIO_BUCKET_FASTQ=fastq-files
      - MINIO_BUCKET_BAM=bam-files
      - MINIO_BUCKET_VCF=vcf-files
      - MINIO_BUCKET_REPORTS=reports
      - MINIO_BUCKET_ANNOTATIONS=annotations
      - MINIO_BUCKET_REFERENCE=genomics
      - MINIO_BUCKET_GENOMICS=genomics
      # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NXF_WORK=/nextflow-work
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - MINIO_PUBLIC_ENDPOINT=localhost:9000
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - postgres
      - neo4j
      - minio
      - bio-pipeline
    networks:
      - genomics-network

  # =======================
  # Graph Database (Neo4j)
  # =======================
  neo4j:
    image: neo4j:5.14-community
    container_name: ai-genomics-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/genomics
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ../graph:/graph
    networks:
      - genomics-network

  # =======================
  # Relational Database (PostgreSQL)
  # =======================
  postgres:
    image: postgres:15
    container_name: ai-genomics-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=genomics
      - POSTGRES_PASSWORD=genomics
      - POSTGRES_DB=genomics
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - genomics-network

  # =======================
  # Object Storage (MinIO)
  # =======================
  minio:
    image: minio/minio
    container_name: ai-genomics-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=genomics
      - MINIO_ROOT_PASSWORD=genomics
      - MINIO_SERVER_URL=http://localhost:9000
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - genomics-network

  # =======================
  # MinIO Bucket Initialization
  # =======================
  minio-init:
    image: minio/mc
    container_name: ai-genomics-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 10;
      mc alias set myminio http://minio:9000 genomics genomics;
      mc mb --ignore-existing myminio/fastq-files;
      mc mb --ignore-existing myminio/bam-files;
      mc mb --ignore-existing myminio/vcf-files;
      mc mb --ignore-existing myminio/reports;
      mc mb --ignore-existing myminio/annotations;
      mc mb --ignore-existing myminio/reference-genomes;
      mc mb --ignore-existing myminio/genomics;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - genomics-network

  # =======================
  # Bioinformatics Pipeline (con Nextflow integrado)
  # =======================
  bio-pipeline:
    build:
      context: ../bio-pipeline
      dockerfile: Dockerfile
    container_name: ai-genomics-bio
    command: tail -f /dev/null
    mem_limit: 24g
    mem_reservation: 16g
    volumes:
      - ../bio-pipeline:/bio-pipeline
      - ../datasets:/datasets
      - ../datasets/reference_genome:/datasets/reference_genome
      - ../datasets/fastq:/datasets/fastq
      - nextflow-work:/nextflow-work
    environment:
      - INPUT_DIR=/datasets/fastq
      - OUTPUT_DIR=/datasets/bam
      - VCF_OUTPUT_DIR=/datasets/vcf
      - ANNOTATION_DIR=/datasets/annotations
      - LOGS_DIR=/datasets/logs
      - NXF_WORK=/nextflow-work
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=genomics
      - MINIO_SECRET_KEY=genomics
      # MinIO Buckets Configuration
      - MINIO_BUCKET_FASTQ=fastq-files
      - MINIO_BUCKET_BAM=bam-files
      - MINIO_BUCKET_VCF=vcf-files
      - MINIO_BUCKET_REPORTS=reports
      - MINIO_BUCKET_ANNOTATIONS=annotations
      - MINIO_BUCKET_REFERENCE=genomics
      - MINIO_BUCKET_GENOMICS=genomics
    networks:
      - genomics-network

  # =======================
  # Frontend (Next.js - Development)
  # =======================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai-genomics-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - API_HOST=ai-genomics-api
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - genomics-network

  # =======================
  # PostgreSQL Web Admin (pgAdmin)
  # =======================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-genomics-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@genomics.com
      PGADMIN_DEFAULT_PASSWORD: genomics
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_SERVERS: '{"Servers": {"1": {"Name": "AI Genomics PostgreSQL", "Group": "Servers", "Host": "postgres", "Port": 5432, "Username": "genomics", "Password": "genomics", "MaintenanceDB": "genomics", "SSLMode": "prefer", "PassFile": "", "SSLCert": "", "SSLKey": "", "SSLRootCert": "", "Timeout": 10}}}'
    depends_on:
      - postgres
    networks:
      - genomics-network

  # =======================
# Networks
# =======================
networks:
  genomics-network:
    driver: bridge

# =======================
# Volumes
# =======================
volumes:
  neo4j-data:
  neo4j-logs:
  postgres-data:
  minio-data:
  reference-data:
  fastq-data:
  datasets-logs:
  datasets-bam:
  datasets-vcf:
  datasets-annotations:
  nextflow-work:
